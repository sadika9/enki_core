name: CI

on:
  push:
    branches:
      - main
      - master
      - devops-release
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_MANIFEST_PATH: crates/bindings/enki-py/Cargo.toml
  PYTHON_ARTIFACT_DIR: crates/bindings/enki-py/artifacts/dist
  UNIFFI_BINDGEN_VERSION: 0.31.0
  RELEASE_ARTIFACT_DIR: release-artifacts

jobs:
  linux:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --manifest-path ${{ env.PYTHON_MANIFEST_PATH }} --release --out ${{ env.PYTHON_ARTIFACT_DIR }} --find-interpreter
          before-script-linux: pip install uniffi-bindgen==${{ env.UNIFFI_BINDGEN_VERSION }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: ${{ env.PYTHON_ARTIFACT_DIR }}

  musllinux:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --manifest-path ${{ env.PYTHON_MANIFEST_PATH }} --release --out ${{ env.PYTHON_ARTIFACT_DIR }} --find-interpreter
          before-script-linux: pip install uniffi-bindgen==${{ env.UNIFFI_BINDGEN_VERSION }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: ${{ env.PYTHON_ARTIFACT_DIR }}

  windows:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          architecture: ${{ matrix.platform.python_arch }}
      - name: Install uniffi-bindgen
        run: python -m pip install uniffi-bindgen==${{ env.UNIFFI_BINDGEN_VERSION }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --manifest-path ${{ env.PYTHON_MANIFEST_PATH }} --release --out ${{ env.PYTHON_ARTIFACT_DIR }} --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: ${{ env.PYTHON_ARTIFACT_DIR }}

  macos:
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install uniffi-bindgen
        run: python -m pip install uniffi-bindgen==${{ env.UNIFFI_BINDGEN_VERSION }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --manifest-path ${{ env.PYTHON_MANIFEST_PATH }} --release --out ${{ env.PYTHON_ARTIFACT_DIR }} --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: ${{ env.PYTHON_ARTIFACT_DIR }}

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install uniffi-bindgen
        run: python -m pip install uniffi-bindgen==${{ env.UNIFFI_BINDGEN_VERSION }}
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path ${{ env.PYTHON_MANIFEST_PATH }} --out ${{ env.PYTHON_ARTIFACT_DIR }}
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: ${{ env.PYTHON_ARTIFACT_DIR }}

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [ linux, musllinux, windows, macos, sdist ]
    environment:
      name: pypi
      url: https://pypi.org/p/enki-py/
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: ${{ env.RELEASE_ARTIFACT_DIR }}
          merge-multiple: true
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: '${{ env.RELEASE_ARTIFACT_DIR }}/*'
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}  # create this secret with a token from https://pypi.org/manage/account/token/
          packages-dir: ${{ env.RELEASE_ARTIFACT_DIR }}

