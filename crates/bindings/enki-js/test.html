<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>enki-js wasm test</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(135deg, #f7f1e3 0%, #dff3e4 100%);
      color: #1d2a1f;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: rgba(255, 252, 245, 0.92);
      border: 1px solid #c8d9c6;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(29, 42, 31, 0.12);
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      line-height: 1.5;
    }

    textarea,
    pre {
      width: 100%;
      box-sizing: border-box;
      border-radius: 12px;
      border: 1px solid #b8c9b7;
      padding: 12px;
      background: #fffdf8;
      font: inherit;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    pre {
      min-height: 180px;
      overflow: auto;
      white-space: pre-wrap;
    }

    button {
      margin-top: 12px;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #215732;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: progress;
    }
  </style>
</head>
<body>
  <main>
    <h1>enki-js wasm test</h1>
    <p>
      Build the web package with <code>npm run build:web</code>, then serve this folder with
      <code>npm run serve:web</code> and open <code>http://localhost:8080/test.html</code>.
    </p>

    <label for="prompt">Prompt</label>
    <textarea id="prompt">hello from the browser</textarea>
    <button id="run">Run agent</button>

    <h2>Output</h2>
    <pre id="output">Waiting to run...</pre>
  </main>

  <script type="module">
    import init, { EnkiJsAgent } from "./pkg-web/enki_js.js";

    const output = document.getElementById("output");
    const prompt = document.getElementById("prompt");
    const runButton = document.getElementById("run");

    const tools = [
      {
        name: "echo",
        description: "Echo a value back to the model",
        parameters_json: JSON.stringify({
          type: "object",
          properties: {
            value: { type: "string" }
          },
          required: ["value"]
        })
      }
    ];

    const llmHandler = async ({ messages }) => {
      const last = messages[messages.length - 1];

      if (last.role === "user") {
        return {
          content: "",
          tool_calls: [
            {
              id: "call-1",
              function: {
                name: "echo",
                arguments: { value: last.content }
              }
            }
          ]
        };
      }

      if (last.role === "tool") {
        return `Browser test reply: ${last.content}`;
      }

      return "No action taken.";
    };

    const toolHandler = async ({ tool, args }) => {
      if (tool === "echo") {
        return `echo:${args.value}`;
      }

      return `Unknown tool: ${tool}`;
    };

    await init();

    const agent = new EnkiJsAgent(
      "Browser Test Agent",
      "Always call the echo tool before replying.",
      4,
      llmHandler,
      toolHandler,
      tools
    );

    runButton.addEventListener("click", async () => {
      runButton.disabled = true;
      output.textContent = "Running...";

      try {
        const result = await agent.run("browser-test", prompt.value);
        output.textContent = result;
      } catch (error) {
        output.textContent = String(error);
      } finally {
        runButton.disabled = false;
      }
    });
  </script>
</body>
</html>
